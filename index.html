<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fernie Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app"></div>
  <div id="floating-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <template id="shell-template">
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">F</div>
          <div>
            <div class="brand-title">Fernie Messenger</div>
            <div class="brand-subtitle">secure chat</div>
          </div>
        </div>

        <!-- Search tabs + input -->
        <div class="sidebar-search-wrapper">
          <div class="search-tabs">
            <button class="search-tab-btn active" data-search-tab="chats" type="button">Чаты</button>
            <button class="search-tab-btn" data-search-tab="people" type="button">Люди</button>
          </div>
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input
              id="chat-search"
              class="input"
              type="text"
              placeholder="Поиск по @username..."
              autocomplete="off"
            >
          </div>
          <div id="chat-search-results" class="search-results hidden"></div>
        </div>

        <div class="sidebar-head">
          <span>Чаты</span>
          <button id="open-profile" class="ghost-btn" type="button">Профиль</button>
        </div>
        <div id="chat-list" class="chat-list"></div>
      </aside>

      <main class="chat-layout">
        <section class="chat-panel">
          <div id="chat-view"></div>
        </section>
        <aside id="profile-panel" class="profile-panel hidden"></aside>
      </main>

      <nav class="mobile-nav" aria-label="Навигация">
        <button id="mobile-nav-chats" class="mobile-nav-btn active" type="button">Чаты</button>
        <button id="mobile-nav-search" class="mobile-nav-btn" type="button">Поиск</button>
        <button id="mobile-nav-profile" class="mobile-nav-btn" type="button">Профиль</button>
      </nav>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
